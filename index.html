<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#111827;min-height:100vh;}
.app{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.logo{font-size:20px;font-weight:700;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.refresh-btn{background:#111827;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;}
.refresh-btn:hover{opacity:0.85;}
.last-scan{font-size:12px;color:#6b7280;}
.tabs{display:flex;gap:2px;border-bottom:1px solid #e5e7eb;margin-bottom:20px;}
.tab{padding:10px 20px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:#111827;border-bottom-color:#111827;}
.page{display:none;}
.page.active{display:block;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:16px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;}
.metric-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;margin-bottom:6px;font-weight:600;}
.metric-val{font-size:26px;font-weight:700;font-family:monospace;line-height:1;margin-bottom:4px;}
.metric-sub{font-size:11px;color:#6b7280;line-height:1.5;}
.verdict{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#166534;line-height:1.6;}
.verdict.warn{background:#fef3c7;border-color:#fcd34d;color:#92400e;}
.summary-box{background:#f5f3ff;border-radius:10px;padding:16px;margin-bottom:16px;}
.summary-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7c3aed;margin-bottom:8px;}
.summary-txt{font-size:13px;color:#4c1d95;line-height:1.7;}
.notice{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px 16px;font-size:13px;color:#1e40af;margin-bottom:16px;line-height:1.6;}
.notice.error{background:#fee2e2;border-color:#fca5a5;color:#991b1b;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.outline-btn{background:none;border:1px solid #d1d5db;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:#374151;font-weight:500;}
.outline-btn:hover{background:#f3f4f6;}
.outline-btn.active{background:#eff6ff;border-color:#3b82f6;color:#1d4ed8;}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;}
.b-green{background:#dcfce7;color:#166534;}.b-amber{background:#fef3c7;color:#92400e;}
.b-red{background:#fee2e2;color:#991b1b;}.b-purple{background:#ede9fe;color:#4c1d95;}
.b-blue{background:#dbeafe;color:#1e40af;}.b-gray{background:#f3f4f6;color:#374151;}
.opp-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;transition:border-color 0.15s;}
.opp-card:hover{border-color:#9ca3af;}
.opp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.opp-ticker{font-size:18px;font-weight:700;font-family:monospace;}
.opp-return{font-size:20px;font-weight:700;font-family:monospace;}
.opp-meta{font-size:11px;color:#6b7280;margin-top:2px;}
.divider{border:none;border-top:1px solid #f3f4f6;margin:12px 0;}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat-l{font-size:10px;color:#9ca3af;margin-bottom:1px;}
.stat-v{font-size:12px;font-family:monospace;font-weight:600;color:#111827;}
.opp-signal{font-size:11px;color:#6b7280;margin-top:10px;line-height:1.5;}
.warn-box{font-size:11px;color:#92400e;background:#fef3c7;border-radius:6px;padding:5px 8px;margin-top:8px;}
.risk{font-size:11px;color:#991b1b;margin-top:6px;font-style:italic;}
.ivp-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.ivp-bar{flex:1;height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden;}
.ivp-fill{height:100%;border-radius:2px;}
.pos-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;}
.pos-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.pos-ticker{font-size:15px;font-weight:700;font-family:monospace;}
.pos-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:10px;border-top:1px solid #f3f4f6;}
.empty{text-align:center;padding:40px 20px;color:#9ca3af;font-size:13px;}
.spinner{text-align:center;padding:40px;font-size:13px;color:#6b7280;}
@media(max-width:640px){.g4{grid-template-columns:repeat(2,1fr);}.g2,.g3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="logo">🐋 Whale Intelligence</div>
    <div class="hdr-right">
      <span class="last-scan" id="last-scan">Loading...</span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('market',this)">Market</button>
    <button class="tab" onclick="showTab('opportunities',this)">Opportunities</button>
    <button class="tab" onclick="showTab('positions',this)">Positions</button>
  </div>

  <!-- MARKET -->
  <div class="page active" id="page-market">
    <div id="market-loading" class="spinner">Loading latest scan results...</div>
    <div id="market-content" style="display:none">
      <div class="g4">
        <div class="metric"><div class="metric-lbl">VIX</div><div class="metric-val" id="vix-val">—</div><div class="metric-sub" id="vix-sub">—</div></div>
        <div class="metric"><div class="metric-lbl">S&P 500</div><div class="metric-val" id="spy-val" style="color:#1e40af">—</div><div class="metric-sub" id="spy-sub">—</div></div>
        <div class="metric"><div class="metric-lbl">Opportunities</div><div class="metric-val" id="opp-count">0</div><div class="metric-sub" id="opp-sub">from last scan</div></div>
        <div class="metric"><div class="metric-lbl">Positions</div><div class="metric-val" id="port-val" style="font-size:18px">—</div><div class="metric-sub">holdings tracked</div></div>
      </div>
      <div id="verdict-box" class="verdict"></div>
      <div id="summary-box" class="summary-box" style="display:none">
        <div class="summary-lbl">🧠 Claude Analysis</div>
        <div class="summary-txt" id="summary-txt"></div>
      </div>
    </div>
    <div id="market-error" style="display:none" class="notice error"></div>
  </div>

  <!-- OPPORTUNITIES -->
  <div class="page" id="page-opportunities">
    <div class="filter-row">
      <button class="outline-btn active" onclick="filterOpps('all',this)">All</button>
      <button class="outline-btn" onclick="filterOpps('execution',this)">✅ Execution Ready</button>
      <button class="outline-btn" onclick="filterOpps('CSP',this)">💰 CSP</button>
      <button class="outline-btn" onclick="filterOpps('CC',this)">📈 CC</button>
      <button class="outline-btn" onclick="filterOpps('LEAPS',this)">🚀 LEAPS</button>
      <button class="outline-btn" onclick="filterOpps('BCS',this)">📊 Bull Call Spread</button>
      <button class="outline-btn" onclick="filterOpps('SPIKE_CC',this)">⚡ Spike CC</button>
      <button class="outline-btn" onclick="filterOpps('DROP_CSP',this)">🔻 Post-Drop</button>
      <button class="outline-btn" onclick="filterOpps('PIO',this)">💼 Position Income</button>
    </div>
    <div class="g2" id="opps-grid"><div class="spinner">Loading...</div></div>
  </div>

  <!-- POSITIONS -->
  <div class="page" id="page-positions">
    <div id="pos-summary" style="display:none;background:#f9fafb;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:12px;line-height:2"></div>
    <div id="pos-table-wrap">
      <table style="width:100%;border-collapse:collapse;font-size:12px" id="pos-table">
        <thead>
          <tr style="border-bottom:2px solid #e5e7eb">
            <th style="text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Ticker</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Tier</th>
            <th style="text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Status</th>
            <th style="text-align:right;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Exposure</th>
            <th style="text-align:center;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Target</th>
            <th style="text-align:center;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Position</th>
            <th style="text-align:center;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Price</th>
            <th style="text-align:center;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#9ca3af;font-weight:600">Action</th>
          </tr>
        </thead>
        <tbody id="pos-tbody"><tr><td colspan="8" style="text-align:center;padding:40px;color:#9ca3af">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const RESULTS_URL = 'https://raw.githubusercontent.com/eastbiz/whale-intelligence/main/results.json';
let data = null;
let currentFilter = 'all';

// ── Load data ─────────────────────────────────────────────
async function loadData() {
  document.getElementById('last-scan').textContent = 'Refreshing...';
  try {
    // Cache-bust so we always get the latest
    const r = await fetch(RESULTS_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    data = await r.json();
    renderAll();
    document.getElementById('last-scan').textContent = 'Scanned: ' + (data.scan_time || '—');
  } catch(e) {
    document.getElementById('last-scan').textContent = 'Load failed';
    document.getElementById('market-loading').style.display = 'none';
    const err = document.getElementById('market-error');
    err.style.display = 'block';
    err.textContent = '⚠️ Could not load scan results: ' + e.message + '. The scanner may not have run yet today, or results.json is missing from the repo.';
  }
}

// ── Render all ────────────────────────────────────────────
function renderAll() {
  document.getElementById('market-loading').style.display = 'none';
  document.getElementById('market-content').style.display = 'block';
  document.getElementById('market-error').style.display = 'none';
  renderMarket();
  renderOpps();
  renderPositions();
}

// ── Market tab ────────────────────────────────────────────
function renderMarket() {
  const m = data.market || {};
  const vix = m.vix || 0;
  const vixEl = document.getElementById('vix-val');
  vixEl.textContent = vix.toFixed(2);
  vixEl.style.color = vix > 30 ? '#166534' : vix > 20 ? '#92400e' : '#6b7280';
  document.getElementById('vix-sub').textContent =
    vix > 30 ? 'Elevated — great for premium selling' :
    vix > 20 ? 'Moderate — selective opportunities' : 'Low — premiums compressed';

  document.getElementById('spy-val').textContent = '$' + (m.spy || 0).toLocaleString();
  document.getElementById('spy-sub').textContent = m.spy_above
    ? '✅ Above 200MA — normal environment'
    : '⚠️ Below 200MA ($' + (m.spy_ma200||0).toFixed(0) + ') — reduce risk';

  const opps = data.dashboard_opportunities || data.opportunities || [];
  const above20 = opps.filter(o => o.annualized_return >= 20).length;
  document.getElementById('opp-count').textContent = opps.length;
  document.getElementById('opp-sub').textContent = above20 + ' above 20% minimum';

  const pos = data.positions || [];
  const owned = pos.filter(p => p.status === 'Owned').length;
  document.getElementById('port-val').textContent = owned + ' owned';

  const vb = document.getElementById('verdict-box');
  vb.textContent = m.verdict || '';
  vb.className = 'verdict' + (m.spy_above ? '' : ' warn');

  if (data.analysis) {
    document.getElementById('summary-txt').textContent = data.analysis;
    document.getElementById('summary-box').style.display = 'block';
  }
}

// ── Opportunities tab ─────────────────────────────────────
function renderOpps() {
  const grid = document.getElementById('opps-grid');
  // Use dashboard_opportunities (full list) if available, else fall back to strict opps
  const allOpps = data.review_candidates || data.dashboard_opportunities || data.opportunities || [];
  const filtered = currentFilter === 'all' ? allOpps
    : currentFilter === 'execution' ? allOpps.filter(o => o.candidate_type === 'execution')
    : allOpps.filter(o => o.mode === currentFilter);

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No ' + (currentFilter === 'all' ? '' : currentFilter + ' ') + 'opportunities in the last scan.<br><br>The scanner is working correctly — it only shows trades that pass all quality filters.</div>';
    return;
  }

  const modeMap = {
    CSP:['b-green','CSP'], CC:['b-green','CC'], LEAPS:['b-purple','LEAPS'],
    SPIKE_CC:['b-amber','Spike CC'], DROP_CSP:['b-red','Post-Drop'], PIO:['b-blue','Position Income']
  };

  grid.innerHTML = filtered.map(o => {
    const [bc, bl] = modeMap[o.mode] || ['b-gray', o.mode];
    const ret = o.annualized_return || 0;
    const rc = ret > 25 ? '#166534' : ret > 20 ? '#15803d' : ret > 15 ? '#92400e' : '#6b7280';
    const ivp = o.ivp || 0;
    const ic = ivp > 50 ? '#166534' : ivp > 30 ? '#92400e' : '#9ca3af';
    const ibc = ivp > 50 ? 'b-green' : ivp > 30 ? 'b-amber' : 'b-gray';
    const ilbl = ivp > 50 ? 'Elevated' : ivp > 30 ? 'Good' : 'Low';
    const ppd = (o.premium && o.dte) ? (o.premium / o.dte).toFixed(2) : '—';
    const belowMin = ret < 20 && ['CSP','DROP_CSP'].includes(o.mode);
    return `
    <div class="opp-card">
      <div class="opp-top">
        <div>
          <div class="opp-ticker">${o.ticker}</div>
          <div class="opp-meta">${o.tier} • <span class="badge ${bc}">${bl}</span>${o.quality_label ? ' <span class="badge ' + (o.quality_label==='Strong'?'b-green':o.quality_label==='Acceptable'?'b-amber':'b-gray') + '">' + o.quality_label + '</span>' : ''}${o.candidate_type === 'execution' ? ' <span class="badge b-green" style="font-size:9px">✅ Exec</span>' : ''}</div>
        </div>
        <div style="text-align:right">
          <div class="opp-return" style="color:${rc}">${ret}%</div>
          <div class="opp-meta">annualized</div>
        </div>
      </div>
      <div class="ivp-row">
        <span style="font-size:10px;color:#9ca3af;min-width:22px">IVP</span>
        <div class="ivp-bar"><div class="ivp-fill" style="width:${Math.min(ivp,100)}%;background:${ic}"></div></div>
        <span style="font-family:monospace;font-size:11px;color:${ic};min-width:28px">${ivp}%</span>
        <span class="badge ${ibc}">${ilbl}</span>
      </div>
      ${!o.passes_quality ? '<div class="warn-box">⚠️ Does not pass strict quality filter — review warnings before trading</div>' : ''}
      ${belowMin ? '<div class="warn-box">⚠️ Below 20% minimum — consider skipping or try a wider strike</div>' : ''}
      ${o.warnings && o.warnings.length ? '<div class="warn-box">⚠️ ' + o.warnings.join(' | ') + '</div>' : ''}
      <hr class="divider">
      <div class="stats">
        <div><div class="stat-l">Strike</div><div class="stat-v">${o.mode === 'BCS' ? '$' + o.long_strike + ' / $' + o.short_strike : '$' + o.strike}</div></div>
        <div><div class="stat-l">DTE</div><div class="stat-v">${o.dte}</div></div>
        <div><div class="stat-l">Delta δ</div><div class="stat-v" style="color:${Math.abs((o.delta||0)-0.28)<0.08?'#166534':'#92400e'}">${o.delta}</div></div>
        <div><div class="stat-l">Premium</div><div class="stat-v">$${o.premium}</div></div>
        <div><div class="stat-l">$/day</div><div class="stat-v">$${o.premium_per_day || ppd}</div></div>
        <div><div class="stat-l">Breakeven</div><div class="stat-v" style="font-weight:600">${o.breakeven ? '$' + o.breakeven : '—'}</div></div>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${o.risk_level ? '<span class="badge ' + (o.risk_level==='Low'?'b-green':o.risk_level==='Medium'?'b-amber':'b-red') + '">Risk: ' + o.risk_level + '</span>' : ''}
        ${o.position_status ? '<span class="badge b-blue">'+o.position_status+'</span>' : ''}
        <span style="font-size:11px;color:#6b7280">IVP: ${o.ivp}% (${o.ivp>70?'Elevated':o.ivp>40?'Good':o.ivp>20?'Moderate':'Low'})</span>
        ${(() => {
          const ns = o.normalized !== undefined ? o.normalized : null;
          const us = o.unified_score !== undefined ? o.unified_score : null;
          const sc = o.score !== undefined ? o.score : null;
          if (ns !== null) return '<span style="font-size:10px;color:#6366f1;margin-left:auto;font-weight:600" title="Normalized 0-1">↑ '+(ns*100).toFixed(0)+'%</span>';
          if (us !== null) return '<span style="font-size:10px;color:#9ca3af;margin-left:auto">★ '+us+'/10</span>';
          if (sc !== null) return '<span style="font-size:10px;color:#9ca3af;margin-left:auto">Score: '+sc+'</span>';
          return '';
        })()}
      </div>
      ${o.signal ? `<div class="opp-signal">${o.signal}</div>` : ''}
      ${o.risk_note ? `<div class="risk">${o.risk_note}</div>` : ''}
    </div>`;
  }).join('');
}

function filterOpps(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-row .outline-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (data) renderOpps();
}

// ── Positions tab ─────────────────────────────────────────
function renderPositions() {
  const positions = data.positions || [];
  const tbody = document.getElementById('pos-tbody');
  if (!positions.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#9ca3af">No positions in last scan.</td></tr>';
    return;
  }

  const actionColor = a => a==='BUY'?'#166534':a==='ADD'?'#15803d':a==='HOLD'?'#1e40af':a==='TRIM'?'#92400e':'#991b1b';
  const actionBg    = a => a==='BUY'?'#dcfce7':a==='ADD'?'#f0fdf4':a==='HOLD'?'#dbeafe':a==='TRIM'?'#fef3c7':'#fee2e2';
  const tierColor   = t => t==='Core'?'#1e40af':t==='Growth'?'#4c1d95':t==='Cyclical'?'#92400e':'#374151';
  const tierBg      = t => t==='Core'?'#dbeafe':t==='Growth'?'#ede9fe':t==='Cyclical'?'#fef3c7':'#f3f4f6';
  const posColor    = s => s==='Overweight'?'#991b1b':s==='On Target'?'#166534':'#1e40af';
  const priceColor  = p => p==='Pullback'?'#166534':p==='Near High'?'#991b1b':'#6b7280';

  tbody.innerHTML = positions.map(p => `
    <tr style="border-bottom:1px solid #f3f4f6" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
      <td style="padding:10px;font-weight:600;font-family:monospace;font-size:13px">${p.ticker}${p.status==='Watchlist'?'<span style="font-size:9px;color:#9ca3af;font-family:sans-serif;font-weight:400;margin-left:4px">watch</span>':''}</td>
      <td style="padding:10px"><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:${tierBg(p.tier)};color:${tierColor(p.tier)}">${p.tier}</span></td>
      <td style="padding:10px;font-size:12px;color:#6b7280">${p.status}</td>
      <td style="padding:10px;text-align:right;font-family:monospace;font-weight:600;font-size:13px">${p.exposure_pct > 0 ? p.exposure_pct + '%' : '—'}</td>
      <td style="padding:10px;text-align:center;font-size:11px;color:#6b7280">${p.target_range}</td>
      <td style="padding:10px;text-align:center;font-size:11px;font-weight:600;color:${posColor(p.pos_status)}">${p.pos_status}</td>
      <td style="padding:10px;text-align:center;font-size:11px;color:${priceColor(p.price_opp)};font-weight:500">${p.price_opp}${p.pullback_pct > 8 ? '<br><span style="font-size:10px;color:#9ca3af">'+p.pullback_pct+'% off high</span>' : ''}</td>
      <td style="padding:10px;text-align:center">
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;background:${actionBg(p.action)};color:${actionColor(p.action)}">${p.action}</span>
        ${p.sizing_action && p.sizing_action !== p.action ? '<br><span style="font-size:9px;color:#9ca3af;margin-top:2px;display:inline-block">sizing: '+p.sizing_action+'</span>' : ''}
      </td>
    </tr>`).join('');

  // Summary block — top 5 each category
  const buys  = positions.filter(p => ['BUY','ADD'].includes(p.action)).slice(0,5).map(p=>p.ticker).join(', ');
  const holds = positions.filter(p => p.action==='HOLD').slice(0,5).map(p=>p.ticker).join(', ');
  const trims = positions.filter(p => ['TRIM','REDUCE'].includes(p.action)).slice(0,5).map(p=>p.ticker).join(', ');
  const sumEl = document.getElementById('pos-summary');
  if (sumEl) {
    sumEl.style.display = 'block';
    sumEl.innerHTML = `
      <div style="margin-bottom:4px"><strong style="color:#166534">▲ BUY / ADD:</strong> <span style="color:#374151">${buys || '—'}</span></div>
      <div style="margin-bottom:4px"><strong style="color:#1e40af">● HOLD:</strong> <span style="color:#374151">${holds || '—'}</span></div>
      <div><strong style="color:#991b1b">▼ TRIM / REDUCE:</strong> <span style="color:#374151">${trims || '—'}</span></div>`;
  }
}

// ── Nav ───────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Init ──────────────────────────────────────────────────
loadData();
</script>
</body>
