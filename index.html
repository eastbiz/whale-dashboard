    .field input:focus { border-color:#6366f1; }

// ── Helpers ───────────────────────────────────────────────
function ann(premium, strike, dte) {
  // Correct formula: (premium / strike) * (365 / dte) * 100
  // Matches spreadsheet: $3.85 / $280 * (365/29) * 100 = 17.3%
  if (!premium || !strike || !dte) return 0;
  return parseFloat(((premium / strike) * (365 / dte) * 100).toFixed(1));
}

async function callClaude(key, prompt, maxTok = 1500) {
  if (!key || key.length < 10) throw new Error("No API key — add in Settings first");
  let r;
  try {
    r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTok, messages: [{ role: "user", content: prompt }] })
    });
  } catch(fetchErr) {
    throw new Error("Network error — check internet connection: " + fetchErr.message);
  }
  if (!r.ok) {
    let body = "";
    try { body = await r.text(); } catch(e) {}
    throw new Error("API " + r.status + " — " + body.slice(0,100));
  }
  const d = await r.json();
  const txt = d.content[0].text;
  const m = txt.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
  return m ? m[1] : txt;
}

// ── Sub-components ────────────────────────────────────────
function IvpBar({ ivp }) {
  const c = ivp > 50 ? "#166534" : ivp > 30 ? "#92400e" : "#9ca3af";
  const bc = ivp > 50 ? "b-green" : ivp > 30 ? "b-amber" : "b-gray";
  const lbl = ivp > 50 ? "Elevated" : ivp > 30 ? "Good" : "Low";
  return (
    <div className="ivp-row">
      <span style={{fontSize:10,color:"#9ca3af",minWidth:22}}>IVP</span>
      <div className="ivp-bar"><div className="ivp-fill" style={{width:Math.min(ivp,100)+"%",background:c}}/></div>
      <span style={{fontFamily:"monospace",fontSize:11,color:c,minWidth:28}}>{ivp}%</span>
      <span className={`badge ${bc}`}>{lbl}</span>
    </div>
  );
}

function OppCard({ opp }) {
  const modes = { CSP:["b-green","CSP"], CC:["b-green","CC"], LEAPS:["b-purple","LEAPS"], SPIKE_CC:["b-amber","Spike CC"], DROP_CSP:["b-red","Post-Drop"], PIO:["b-blue","Position Income"] };
  const [bc, bl] = modes[opp.mode] || ["b-gray", opp.mode];
  const ret = opp.annualized_return;
  const rc = ret > 25 ? "#166534" : ret > 20 ? "#15803d" : ret > 15 ? "#92400e" : "#6b7280";
  const belowMin = ret < 20 && ["CSP","DROP_CSP"].includes(opp.mode);
  const ppd = opp.premium && opp.dte ? (opp.premium / opp.dte).toFixed(2) : "—";
  return (
    <div className="opp-card">
      <div className="opp-top">
        <div>
          <div className="opp-ticker">{opp.ticker}</div>
          <div className="opp-meta">{opp.tier} • <span className={`badge ${bc}`}>{bl}</span></div>
        </div>
        <div style={{textAlign:"right"}}>
          <div className="opp-return" style={{color:rc}}>{ret}%</div>
          <div className="opp-meta">annualized</div>
        </div>
      </div>
      <IvpBar ivp={opp.ivp||0}/>
      {belowMin && <div className="warn-box">⚠️ Below 20% minimum — consider skipping or check wider strike</div>}
      <hr className="divider"/>
      <div className="stats">
        <div><div className="stat-l">Strike</div><div className="stat-v">${opp.strike}</div></div>
        <div><div className="stat-l">Expiry</div><div className="stat-v">{opp.expiry}</div></div>
        <div><div className="stat-l">DTE</div><div className="stat-v">{opp.dte}</div></div>
        <div><div className="stat-l">Premium</div><div className="stat-v">${opp.premium}</div></div>
        <div><div className="stat-l">Delta</div><div className="stat-v">{opp.delta}</div></div>
        <div><div className="stat-l">$/day</div><div className="stat-v">${ppd}</div></div>
      </div>
      {opp.signal && <div className="signal">{opp.signal}</div>}
      {opp.risk_note && <div className="risk">{opp.risk_note}</div>}
    </div>
  );
}

function PosCard({ pos }) {
  const pnl = pos.pnl_pct ?? ((pos.current_price - pos.avg_cost) / pos.avg_cost * 100);
  const pc = pnl > 5 ? "#166534" : pnl < -5 ? "#991b1b" : "#92400e";
  const tb = pos.tier === "Core" ? "b-blue" : pos.tier === "Growth" ? "b-purple" : pos.tier === "Cyclical" ? "b-amber" : "b-gray";
  const mv = ((pos.shares||0)*(pos.current_price||0)).toLocaleString("en-US",{maximumFractionDigits:0});
  return (
    <div className="pos-card">
      <div className="pos-hdr">
        <div>
          <div className="pos-ticker">{pos.ticker}</div>
          <div className="opp-meta"><span className={`badge ${tb}`}>{pos.tier}</span> {pos.account}</div>
        </div>
        <div style={{fontFamily:"monospace",fontSize:15,fontWeight:700,color:pc}}>{pnl>0?"+":""}{pnl.toFixed(1)}%</div>
      </div>
      <div className="pos-stats">
        <div><div className="stat-l">Shares</div><div className="stat-v">{pos.shares}</div></div>
        <div><div className="stat-l">Avg cost</div><div className="stat-v">${pos.avg_cost}</div></div>
        <div><div className="stat-l">Price</div><div className="stat-v">${pos.current_price}</div></div>
        <div><div className="stat-l">Value</div><div className="stat-v">${mv}</div></div>
        <div><div className="stat-l">Global %</div><div className="stat-v">{pos.global_pct}%</div></div>
        <div><div className="stat-l">Status</div><div className="stat-v" style={{color:pc}}>{pos.pnl_status}</div></div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("market");
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("wi_key")||"");
  const [scanning, setScanning] = useState(false);
  const [market, setMarket] = useState({});
  const [opps, setOpps] = useState([]);
  const [positions, setPositions] = useState([]);
  const [analysis, setAnalysis] = useState("");
  const [logs, setLogs] = useState([]);
  const [filter, setFilter] = useState("all");
  const [saved, setSaved] = useState(false);

  const addLog = (txt, c) => setLogs(p => [...p, {txt, c}]);
  const saveKey = () => { localStorage.setItem("wi_key", apiKey); setSaved(true); setTimeout(()=>setSaved(false),2000); };

  async function fetchMarket() {
    addLog("Fetching market conditions...", "b");
    try {
      const raw = await callClaude(apiKey, `Return ONLY valid JSON for today ${new Date().toLocaleDateString()}:
{"vix":24.3,"spy":6697,"spy_ma200":6200,"spy_above":true,"verdict":"VIX at 24 with most watchlist stocks 15-30% off highs — selective premium selling environment. Check IVP per stock.","scan_time":"${new Date().toLocaleTimeString("en-US",{timeZone:"America/Los_Angeles",hour:"2-digit",minute:"2-digit"})} PT"}
Provide realistic current values. Return ONLY JSON, no other text.`);
      const d = JSON.parse(raw);
      setMarket(d);
      addLog(`Market loaded — VIX ${d.vix}`, "g");
      return d;
    } catch(e) { addLog("Market: "+e.message, "r"); return {}; }
  }

  async function fetchOpps(mkt) {
    addLog("Scanning 30 stocks for opportunities...", "b");
    const wl = ["AAPL","AMZN","ASML","BRK-B","GOOGL","MSFT","NVDA","TSM","IBKR","MELI","CPRT","VRTX","NVO","NOW","DDOG","UBER","NFLX","PLTR","META","MU","KNX","POWL","CLS","CRDO","FIX","VRT","IBIT","TSLA","NBIS","LULU"];
    try {
      const raw = await callClaude(apiKey, `Expert options scanner. Today ${new Date().toLocaleDateString()}. VIX: ${mkt.vix||24}.
Watchlist: ${wl.join(", ")}

CRITICAL annualized return formula:
annualized = (premium / strike) * (365 / dte) * 100
Example: $3.85 premium, $280 strike, 29 DTE = (3.85/280)*(365/29)*100 = 17.3%
NOT premium/stock_price. Use STRIKE as denominator.

Rules:
- CSP: IVP>30, delta 0.25-0.30, 30-45 DTE, stock >15% below 52w high, above 200MA
- LEAPS: IVP<50%, delta 0.80-0.90, 500+ DTE, Core/Growth stocks
- SPIKE_CC: stock up 8%+ recently, IVP>40, 14-30 DTE  
- DROP_CSP: stock down 8%+ recently, above 200MA, IVP>40

Find 6-8 best setups. Return ONLY JSON array:
[{"ticker":"GOOGL","mode":"CSP","ivp":55,"strike":280,"expiry":"2026-04-17","dte":29,"premium":3.85,"annualized_return":17.3,"delta":0.27,"signal":"IVP 55% elevated. Strike $280 = 9.7% buffer. Below 20% min — check $260 strike.","tier":"Core","risk_note":null}]

Include below-minimum trades with note. Use correct formula.`, 2000);
      const data = JSON.parse(raw);
      // Re-verify annualized with correct formula
      const verified = data.map(o => ({...o, annualized_return: ann(o.premium, o.strike, o.dte)}));
      setOpps(verified);
      verified.forEach(o => addLog(`  [${o.tier}] ${o.ticker}: ${o.mode} $${o.strike} ${o.annualized_return}% ann`, o.annualized_return >= 20 ? "g" : "b"));
      addLog(`Found ${verified.length} opportunities`, "g");
    } catch(e) { addLog("Scan: "+e.message, "r"); }
  }

  async function fetchPositions() {
    addLog("Loading positions...", "b");
    try {
      const raw = await callClaude(apiKey, `Sample portfolio for $7M options trader. Holdings across IRA, CRT, IBKR.
Return ONLY JSON array of 9 positions using realistic current prices:
[{"ticker":"NVDA","shares":300,"avg_cost":145.50,"current_price":182.00,"pnl_pct":25.2,"pnl_status":"profit","tier":"Core","account":"IBKR","global_pct":7.8}]`);
      const data = JSON.parse(raw);
      setPositions(data);
      addLog(`${data.length} positions loaded`, "g");
    } catch(e) { addLog("Positions: "+e.message, "r"); }
  }

  async function runAnalysis(mkt, oppList) {
    addLog("Running Claude analysis...", "b");
    try {
      const txt = await callClaude(apiKey, `Options trader review. ${new Date().toLocaleDateString()}. VIX ${mkt.vix||24}.
Opportunities: ${JSON.stringify(oppList.slice(0,5))}
Note: annualized = (premium/strike)*(365/dte)*100. Some may be below 20% CSP minimum.
3-4 sentences: market environment, best 1-2 trades with rationale, key risk. Direct and actionable.`, 600);
      setAnalysis(txt);
      addLog("Analysis complete", "g");
    } catch(e) { addLog("Analysis: "+e.message, "r"); }
  }

  async function runScan() {
    if (!apiKey) { addLog("Add Anthropic API key in Settings first", "r"); setTab("settings"); return; }
    setScanning(true); setLogs([]);
    addLog("🐋 WHALE INTELLIGENCE SCAN", "b");
    const mkt = await fetchMarket();
    await fetchOpps(mkt);
    await fetchPositions();
    await runAnalysis(mkt, opps);
    addLog("✅ SCAN COMPLETE", "g");
    setScanning(false);
  }

  const filtered = filter === "all" ? opps : opps.filter(o => o.mode === filter);
  const vc = market.vix > 30 ? "#166534" : market.vix > 20 ? "#92400e" : "#6b7280";

  return (
    <>
      <style>{S.STYLES}</style>
      <div className="app">

        {/* Header */}
        <div className="hdr">
          <div className="logo">🐋 Whale Intelligence</div>
          <button className="run-btn" onClick={runScan} disabled={scanning}>
            {scanning ? "⟳ Scanning..." : "▶ Run Scan"}
          </button>
        </div>

        {/* Tabs */}
        <div className="tabs">
          {["market","opportunities","positions","settings"].map(t=>(
            <button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>
              {t.charAt(0).toUpperCase()+t.slice(1)}
            </button>
          ))}
        </div>

        {/* MARKET */}
        {tab==="market" && <>
          <div className="g4">
            <div className="metric">
              <div className="metric-lbl">VIX</div>
              <div className="metric-val" style={{color:vc}}>{market.vix||"—"}</div>
              <div className="metric-sub">{market.vix>30?"Elevated — great for premium selling":market.vix>20?"Moderate — selective opportunities":"Low — premiums compressed"}</div>
            </div>
            <div className="metric">
              <div className="metric-lbl">S&P 500</div>
              <div className="metric-val" style={{color:"#1e40af"}}>{market.spy?"$"+market.spy.toLocaleString():"—"}</div>
              <div className="metric-sub">{market.spy_above?"✅ Above 200MA — normal environment":"⚠️ Below 200MA — reduce risk"}</div>
            </div>
            <div className="metric">
              <div className="metric-lbl">Opportunities</div>
              <div className="metric-val" style={{color:"#111827"}}>{opps.length}</div>
              <div className="metric-sub">{opps.filter(o=>o.annualized_return>=20).length} above 20% minimum</div>
            </div>
            <div className="metric">
              <div className="metric-lbl">Scanned</div>
              <div className="metric-val" style={{fontSize:14,lineHeight:1.3}}>{market.scan_time||"—"}</div>
              <div className="metric-sub">30 stocks across 4 modes</div>
            </div>
          </div>

          {market.verdict && <div className="verdict"><strong>Context:</strong> {market.verdict}</div>}

          {analysis && (
            <div className="summary-box">
              <div className="summary-lbl">🧠 Claude Analysis</div>
              <div className="summary-txt">{analysis}</div>
            </div>
          )}

          {logs.length === 0
            ? <div className="notice">Configure your Anthropic API key in Settings, then click Run Scan.</div>
            : <>
                <div className="sec-lbl">Scan log</div>
                <div className="log">{logs.map((l,i)=><div key={i} className={l.c||""}>{l.txt}</div>)}</div>
              </>
          }
        </>}

        {/* OPPORTUNITIES */}
        {tab==="opportunities" && <>
          <div className="filter-row">
            {[["all","All"],["CSP","💰 CSP"],["CC","📈 CC"],["LEAPS","🚀 LEAPS"],["SPIKE_CC","⚡ Spike CC"],["DROP_CSP","🔻 Post-Drop"],["PIO","💼 Position Income"]].map(([f,lbl])=>(
              <button key={f} className={`outline-btn ${filter===f?"active":""}`} onClick={()=>setFilter(f)}>{lbl}</button>
            ))}
          </div>
          {filtered.length===0
            ? <div className="empty">No {filter==="all"?"":filter+" "}opportunities yet — run a scan first.</div>
            : <div className="g2">{filtered.map((o,i)=><OppCard key={i} opp={o}/>)}</div>
          }
        </>}

        {/* POSITIONS */}
        {tab==="positions" && <>
          <div className="notice">Positions shown are Claude estimates. Live data comes from the scanner on your Windows laptop via Telegram alerts.</div>
          {positions.length===0
            ? <div className="empty">Run a scan to load positions.</div>
            : <div className="g3">{positions.map((p,i)=><PosCard key={i} pos={p}/>)}</div>
          }
        </>}

        {/* SETTINGS */}
        {tab==="settings" && <>
          <div className="card" style={{marginBottom:16}}>
            <div className="sec-lbl" style={{marginTop:0}}>API Configuration</div>
            <div className="field">
              <label>Anthropic API Key</label>
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..."/>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button className="run-btn" onClick={saveKey}>Save Key</button>
              {saved && <span style={{fontSize:12,color:"#166534"}}>✅ Saved</span>}
              <span style={{fontSize:12,color:"#6b7280"}}>Stored in browser only. Never shared.</span>
            </div>
          </div>

          <div className="card">
            <div className="sec-lbl" style={{marginTop:0}}>Annualized Return Formula</div>
            <div className="formula-box">
              <div style={{color:"#374151"}}>annualized = (premium ÷ strike) × (365 ÷ DTE) × 100</div>
              <div style={{color:"#6b7280",fontSize:11}}>Example: $3.85 premium, $280 strike, 29 DTE</div>
              <div style={{color:"#166534",fontSize:11}}>= (3.85 ÷ 280) × (365 ÷ 29) × 100 = <strong>17.3%</strong></div>
              <div style={{color:"#6b7280",fontSize:11,marginTop:4}}>Collateral = strike × 100 per contract. Matches your spreadsheet.</div>
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginTop:12,lineHeight:1.6}}>
              Trades below 20% minimum show a yellow warning but still appear so you can decide.
              Numbers are re-verified client-side after Claude generates them.
            </div>
          </div>
        </>}

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
